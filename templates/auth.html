<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resumate - Authentication</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
  <a href="{{ url_for('home') }}" class="btn-back-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:6px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Home
  </a>
  <!-- Add decorative background blobs like the main page -->
  <div class="bg-gradient"></div>
  <div class="glass-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container-wrapper">
    <div class="container {% if form == 'signup' %}change{% endif %}" id="container">
      <div class="forms-container">
        
        <!-- Signup Form -->
        <div class="form-control signup-form">
          <form action="{{ url_for('signup') }}" method="POST">
            <h2>Create Account</h2>
            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" name="username" placeholder="Username" required />
            </div>
            <div class="input-field">
              <i class="fas fa-envelope"></i>
              <input type="email" name="email" placeholder="Email" required />
            </div>
            <div class="input-field">
              <i class="fas fa-lock"></i>
              <input type="password" name="password" placeholder="Password" required />
            </div>
            <div class="input-field">
              <i class="fas fa-lock"></i>
              <input type="password" name="confirm_password" placeholder="Confirm Password" required />
            </div>
            <button type="submit" class="btn">Sign Up</button>
          </form>
          <span>or sign up with</span>
          <div class="socials">
            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
          </div>
        </div>

        <!-- Signin Form -->
        <div class="form-control signin-form">
          <form action="{{ url_for('login') }}" method="POST">
            <h2>Welcome Back</h2>
            <div class="input-field">
              <i class="fas fa-envelope"></i>
              <input type="email" name="email" placeholder="Email" required />
            </div>
            <div class="input-field">
              <i class="fas fa-lock"></i>
              <input type="password" name="password" placeholder="Password" required />
            </div>
            <button type="submit" class="btn">Login</button>
          </form>
          <span>or sign in with</span>
          <div class="socials">
            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
          </div>
        </div>
      </div>

      <div class="intros-container">
        <!-- Intro for left side (when signing in) -->
        <div class="intro-control signup-intro">
          <div class="intro-control__inner">
            <h3>New here?</h3>
            <p>Sign up and discover a great amount of new opportunities with our powerful resume tools.</p>
            <button class="btn transparent" id="signin-btn">Log In</button>
          </div>
        </div>

        <!-- Intro for right side (when signing up) -->
        <div class="intro-control signin-intro">
          <div class="intro-control__inner">
            <h3>One of us?</h3>
            <p>If you already have an account, just sign in. We've missed you!</p>
            <button class="btn transparent" id="signup-btn">Sign Up</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
